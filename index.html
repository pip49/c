    <style>

        :root {

            --accent-color: #2c3e50;
            --border-color: #333333;
            --btn-bg: #2d3238;
            --btn-text: #ced4da;
        }

        .subtitle { font-size: 0.9rem; color: #6c757d; }

	#search-input {

            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
        }

        .filter-container {

            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }
        .filter-btn.active {

            color: white;

            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

            background: var(--card-bg);

            padding: 16px;

            justify-content: space-between;

            color: #868e96;
            margin-bottom: 8px;
        }

            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 12px;
        }

            background-color: var(--accent-color);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            color: #0056b3;
            display: none;
            border-left: 4px solid var(--primary-color);
        }
        .quiz-card.revealed .quiz-answer-box {
            display: block;
        }
	.toggle-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
        }
        .quiz-card.revealed .toggle-btn {
            background: var(--border-color);
            color: var(--text-color);
        }
        .global-actions {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
            gap: 10px;
        }
        .action-btn {
            background: none;
            border: none;
            color: #007bff;
            font-size: 0.85rem;
            cursor: pointer;
        }

</head>

        const catNames = { theory: "전기이론", machine: "전기기기", facility: "전기설비" };

// [추가] 다크모드 토글 및 상태 유지 함수
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');

            if (isDark) {
                btn.innerText = "☀️ 라이트모드";
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerText = "◐ 다크모드";
                localStorage.setItem('theme', 'light');
            }
        }

        // 페이지가 처음 켜질 때 사용자가 이전에 설정했던 테마 불러오기
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-btn').innerText = "☀️ 라이트모드";
            }
        });



function renderQuiz(filter = 'all') {
            const listEl = document.getElementById('quiz-list');
            listEl.innerHTML = '';

            // [수정] 전체 배열에서의 순서(전체 일련번호)를 관리하기 위해 변수 설정
            let globalIdx = 0;

            data.forEach((item) => {
                globalIdx++; // 데이터가 하나씩 돌 때마다 번호를 1씩 증가시킵니다.
                const displayNo = globalIdx; // 이 번호가 화면에 보일 자동 번호입니다.

                if (filter !== 'all' && item.cat !== filter) return;

                const card = document.createElement('div');
                card.className = 'quiz-card';
                // item.no 대신 자동 계산된 displayNo를 사용해 id 부여
                card.id = `card-${displayNo}`;

                card.onclick = (e) => {
                    if (e.target.tagName !== 'A' && e.target.closest('.link-btn') === null) {
                        card.classList.toggle('revealed');
                    }
                };

                const linkHtml = item.link
                    ? `<a href="${item.link}" class=\"link-btn\" style="display:inline-block; margin-top:8px; font-size:0.8rem; color:#007bff; text-decoration:none;">🔗 보충 설명 보기</a>`
                    : '';

                // [수정] 아래 `${item.no}`가 있던 자리를 `${displayNo}`로 교체했습니다.
                card.innerHTML = `
                    <div class="quiz-header">
                        <span>Q. ${displayNo}</span>
                        <span>[${catNames[item.cat]}]</span>
                    </div>
                    <div class="quiz-question">${item.q}</div>
                    <div class="quiz-answer-box">
                        ${item.a}
                        ${linkHtml}
                    </div>
                    <button class="toggle-btn" style="margin-top:8px;">정답 확인</button>
                `;
                listEl.appendChild(card);
            });
        }


        function filterSubject(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderQuiz(cat);
        }

        function toggleAll(show) {
            document.querySelectorAll('.quiz-card').forEach(card => {
                if (show) card.classList.add('revealed');
                else card.classList.remove('revealed');
            });
        }

        // 초기 빌드
        renderQuiz();

// 실시간 검색 함수
        function searchQuiz() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.quiz-card');

            cards.forEach(card => {
                const question = card.querySelector('.quiz-question').innerText.toLowerCase();
                const answer = card.querySelector('.quiz-answer-box').innerText.toLowerCase();

                // 질문이나 정답에 검색어가 포함되어 있으면 보여주고, 없으면 숨김
                if (question.includes(query) || answer.includes(query)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

    </script>
