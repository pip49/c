        const catNames = { theory: "전기이론", machine: "전기기기", facility: "전기설비" };

// [추가] 다크모드 토글 및 상태 유지 함수
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');

            if (isDark) {
                btn.innerText = "☀️ 라이트모드";
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerText = "◐ 다크모드";
                localStorage.setItem('theme', 'light');
            }
        }

        // 페이지가 처음 켜질 때 사용자가 이전에 설정했던 테마 불러오기
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-btn').innerText = "☀️ 라이트모드";
            }
        });


function renderQuiz(filter = 'all') {
            const listEl = document.getElementById('quiz-list');
            listEl.innerHTML = '';

            data.forEach(item => {
                if (filter !== 'all' && item.cat !== filter) return;

                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.id = `card-${item.no}`;

                // 카드 자체를 클릭하면 정답이 토글되되, 링크 클릭 시에는 토글되지 않도록 설정
                card.onclick = (e) => {
                    if (e.target.tagName !== 'A' && e.target.closest('.link-btn') === null) {
                        card.classList.toggle('revealed');
                    }
                };

                // 링크 데이터가 있으면 버튼 HTML을 생성하고, 없으면 빈 칸 처리
                const linkHtml = item.link
                    ? `<a href="${item.link}" target="_blank" class="link-btn" style="display:inline-block; margin-top:8px; font-size:0.8rem; color:#007bff; text-decoration:none;">🔗 보충 설명 보기</a>`
                    : '';

                card.innerHTML = `
                    <div class="quiz-header">
                        <span>Q. ${item.no}</span>
                        <span>[${catNames[item.cat]}]</span>
                    </div>
                    <div class="quiz-question">${item.q}</div>
                    <div class="quiz-answer-box">
                        ${item.a}
                        ${linkHtml}
                    </div>
                    <button class="toggle-btn" style="margin-top:8px;">정답 확인</button>
                `;
                listEl.appendChild(card);
            });
        }


        function filterSubject(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderQuiz(cat);
        }

        function toggleAll(show) {
            document.querySelectorAll('.quiz-card').forEach(card => {
                if (show) card.classList.add('revealed');
                else card.classList.remove('revealed');
            });
        }

        // 초기 빌드
        renderQuiz();

// 실시간 검색 함수
        function searchQuiz() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.quiz-card');

            cards.forEach(card => {
                const question = card.querySelector('.quiz-question').innerText.toLowerCase();
                const answer = card.querySelector('.quiz-answer-box').innerText.toLowerCase();

                // 질문이나 정답에 검색어가 포함되어 있으면 보여주고, 없으면 숨김
                if (question.includes(query) || answer.includes(query)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

    </script>
